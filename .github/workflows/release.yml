name: Release to PyPI

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write  # trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify release metadata alignment
        run: |
          python - <<'PY'
          import os
          import re
          import tomllib
          from pathlib import Path

          root = Path(".")
          tag_version = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          pyproject_version = tomllib.loads((root / "pyproject.toml").read_text())["project"]["version"]

          init_text = (root / "scholaraio" / "__init__.py").read_text()
          init_match = re.search(r'__version__\s*=\s*"([^"]+)"', init_text)
          runtime_version = init_match.group(1) if init_match else None

          cff_text = (root / "CITATION.cff").read_text()
          cff_match = re.search(r'^version:\s*"?([^"\n]+)"?\s*$', cff_text, re.MULTILINE)
          citation_version = cff_match.group(1).strip() if cff_match else None

          versions = {
              "tag": tag_version,
              "pyproject": pyproject_version,
              "runtime": runtime_version,
              "citation": citation_version,
          }
          mismatches = [f"{name}={value}" for name, value in versions.items() if value != pyproject_version]
          if mismatches:
              raise SystemExit(
                  "Release metadata mismatch detected. Expected all versions to equal "
                  f"{pyproject_version}, got: {', '.join(mismatches)}"
              )
          print(f"Release metadata aligned at version {pyproject_version}")
          PY

      - name: Install release dependencies
        run: pip install -e ".[dev,office]" build twine

      - name: Run release smoke tests
        run: pytest -q

      - name: Build package
        run: python -m build

      - name: Check distribution metadata
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
